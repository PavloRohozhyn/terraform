services:
  db:
    image: postgres:15
    container_name: database
    environment:
      - POSTGRES_DB=app-db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./web
    container_name: application
    volumes:
      - ./web/app:/app
    environment:
      - DATABASE_URL=postgres://user:secret@db:5432/app-db
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: web-server
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

volumes:
  postgres_data:
