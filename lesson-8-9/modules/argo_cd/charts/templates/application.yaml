apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: django-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: { { .Values.repoURL } }
    targetRevision: HEAD
    path: charts/django-app
  destination:
    server: https://default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
